    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
              mono: ['Roboto Mono', 'monospace'],
            },
            colors: {
              brand: {
                black: '#0A0A0B',
                gray: '#1C1C1E',
                white: '#F5F5F5',
                red: '#FF3B30',
                yellow: '#FFCC00',
                blue: '#007AFF',
                glow: '#1C6DD0',
              },
              tactical: {
                800: '#1A1A1C',
                900: '#0F0F10',
                accent: '#007AFF',
                success: '#34C759',
              }

          }

    <style>
      body {
        background-color: #0A0A0B;
        color: #F5F5F5;
        overflow-x: hidden;
      }
      /* Scanning line effect */
      .scan-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, #007AFF, transparent);
        position: absolute;
        width: 100%;
        top: 0;
        animation: scan 4s linear infinite;
        opacity: 0.2;
        pointer-events: none;
      }
      @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
      }
      .hud-glow {
        box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
